<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cinemagia</title>
    <base href="/" />
    
    <!-- Disable browser refresh WebSockets before any other scripts load -->
    <script>
        // This disables the AspNetCore browser refresh functionality completely
        window.sessionStorage.setItem('_blazor:hotReloadWebSocket:inProgress', 'never');
        window.sessionStorage.setItem('_blazor:hotReloadWebSocket:enabled', 'false');
        window.sessionStorage.setItem('Microsoft.AspNetCore.SignalR.HubConnectionState', 'Disconnected');
        
        // Disable all WebSocket connections related to browser refresh
        window.addEventListener('load', function() {
            // Clear any error messages in the console when page loads
            if (typeof console._errorOriginal === 'undefined') {
                console._errorOriginal = console.error;
                console.error = function(msg) {
                    // Don't show errors about WebSocket connections failing
                    if (typeof msg === 'string' && 
                        (msg.includes('WebSocket connection') || 
                         msg.includes('browser refresh') ||
                         msg.includes('ws://localhost'))) {
                        return;
                    }
                    console._errorOriginal.apply(console, arguments);
                };
            }
        });
    </script>
    
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/home_style.css" rel="stylesheet" />
    <link href="css/home_navbar.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/seating.css" />
    <link rel="stylesheet" href="css/modals.css" />
    <link rel="stylesheet" href="css/home_footer.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="FrontEnd.styles.css" rel="stylesheet" />
    <link rel="preload" href="img-5.jpg" as="image" />
    <link rel="preload" href="img-6.jpg" as="image" />
    <link rel="preload" href="img-4.jpg" as="image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body, #app {
            width: 100vw;
            max-width: 100vw;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Critical modal fixes that will override everything */
        .modal, 
        .modal-backdrop, 
        div[role="dialog"] {
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
        
        /* Ensure seat selection modals have transparent background */
        .seat-selection-modal,
        .modal[id^="seatSelectionModal"] {
            background-color: transparent !important;
        }
        
        /* Ensure modals are hidden by default */
        .modal {
            display: none !important;
            position: fixed !important;
            z-index: 9999 !important;
            height: 100% !important; 
            width: 100% !important;
            top: 0 !important;
            left: 0 !important;
        }
        
        .modal.show {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* Make a clean backdrop with right opacity */
        .modal-backdrop, 
        .modal-backdrop.show {
            opacity: 0.7 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 9990 !important;
            pointer-events: none !important;
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
        
        /* Transparent backdrop for seat selection */
        .seat-selection-modal + .modal-backdrop,
        .modal-backdrop.seat-selection-backdrop {
            background-color: transparent !important;
            opacity: 0 !important;
        }
        
        /* Prevent background scrolling when modal is open */
        body.modal-open {
            overflow: hidden !important;
            position: fixed !important;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Ensure content is visible inside modals */
        .modal-dialog,
        .modal-content {
            z-index: 10000 !important;
            position: relative !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <div style="position:absolute; top:30vh; width:100%; text-align:center">
            <div style="display:flex; gap:10px; justify-content:center; align-items:center">
                <div class="spinner-border" role="status"></div>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="js/sortFilms.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/print-ticket.js"></script>
    <script src="js/home.js" type="module"></script>
    <script src="js/site.js"></script>
    <script>
        // Initialize all modals on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Hide all modals and remove any existing backdrops
            var modals = document.querySelectorAll('.modal');
            modals.forEach(function(modal) {
                modal.style.display = 'none';
                modal.classList.remove('show');
                
                // Specific handling for the seating options modal to ensure it gets proper backdrop
                if (modal.id === 'seatingOptionsModal') {
                    modal.classList.remove('seat-map-modal');
                    
                    // Add observer to initialize radio options when this modal becomes visible
                    var observer = new MutationObserver(function(mutations) {
                        mutations.forEach(function(mutation) {
                            if (mutation.attributeName === 'style' && 
                                modal.style.display !== 'none') {
                                // Initialize radio options when modal is shown
                                if (typeof initializeRadioOptions === 'function') {
                                    setTimeout(function() {
                                        initializeRadioOptions(modal);
                                    }, 100);
                                }
                            }
                        });
                    });
                    
                    observer.observe(modal, { attributes: true });
                }
                
                // Set attributes to prevent auto-closing
                modal.setAttribute('data-backdrop', 'static');
                modal.setAttribute('data-keyboard', 'false');
                modal.setAttribute('data-bs-backdrop', 'static');
                modal.setAttribute('data-bs-keyboard', 'false');
            });
            
            // Remove any existing backdrops
            var backdrops = document.querySelectorAll('.modal-backdrop');
            backdrops.forEach(function(backdrop) {
                backdrop.remove();
            });
            
            // Clean up body classes
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        });
    </script>
</body>

</html>
