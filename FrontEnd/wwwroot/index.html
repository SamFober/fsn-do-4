<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />

    <!-- Disable browser refresh WebSockets before any other scripts load -->
    <script>
        // This disables the AspNetCore browser refresh functionality completely
        window.sessionStorage.setItem('_blazor:hotReloadWebSocket:inProgress', 'never');
        window.sessionStorage.setItem('_blazor:hotReloadWebSocket:enabled', 'false');
        window.sessionStorage.setItem('Microsoft.AspNetCore.SignalR.HubConnectionState', 'Disconnected');
        
        // Disable all WebSocket connections related to browser refresh
        window.addEventListener('load', function() {
            // Clear any error messages in the console when page loads
            if (typeof console._errorOriginal === 'undefined') {
                console._errorOriginal = console.error;
                console.error = function(msg) {
                    // Don't show errors about WebSocket connections failing
                    if (typeof msg === 'string' && 
                        (msg.includes('WebSocket connection') || 
                         msg.includes('browser refresh') ||
                         msg.includes('ws://localhost'))) {
                        return;
                    }
                    console._errorOriginal.apply(console, arguments);
                };
            }
        });
    </script>
    
    <!-- Modal Fix Script -->
    <script>
        // Modal helper function - called from Blazor
        window.fixModals = function() {
            // Ensure modals are properly positioned when displayed
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                if (overlay.style.display !== 'none') {
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0';
                    overlay.style.left = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.zIndex = '2000';
                    
                    // Fix containers inside overlays
                    const containers = overlay.querySelectorAll('.modal-container');
                    containers.forEach(container => {
                        container.style.position = 'fixed';
                        container.style.top = '50%';
                        container.style.left = '50%';
                        container.style.transform = 'translate(-50%, -50%)';
                        container.style.zIndex = '2001';
                        container.style.maxHeight = '90vh';
                        container.style.overflowY = 'auto';
                    });
                }
            });
            
            // Fix body scroll when modals are open
            const activeModals = document.querySelectorAll('.modal-overlay');
            if (activeModals.length > 0 && Array.from(activeModals).some(m => m.style.display !== 'none')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        };
        
        // Run on page load and periodically check
        window.addEventListener('DOMContentLoaded', function() {
            // Initial check
            window.fixModals();
            
            // Check periodically for any dynamically added modals
            setInterval(window.fixModals, 500);
            
            // Also set up a mutation observer
            const observer = new MutationObserver(function() {
                window.fixModals();
            });
            
            // Start observing the document body for added nodes
            observer.observe(document.body, { 
                childList: true, 
                subtree: true,
                attributes: true,
                attributeFilter: ['style', 'class']
            });
        });
    </script>

    <style>
        html, body, #app {
            width: 100vw;
            max-width: 100vw;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Critical modal fixes that will override everything */
        .modal, 
        .modal-backdrop, 
        div[role="dialog"] {
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
        
        /* Ensure seat selection modals have transparent background */
        .seat-selection-modal,
        .modal[id^="seatSelectionModal"] {
            background-color: transparent !important;
        }
        
        /* Ensure modals are hidden by default */
        .modal {
            display: none !important;
            position: fixed !important;
            z-index: 9999 !important;
            height: 100% !important; 
            width: 100% !important;
            top: 0 !important;
            left: 0 !important;
        }
        
        .modal.show {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* Make a clean backdrop with right opacity */
        .modal-backdrop, 
        .modal-backdrop.show {
            opacity: 0.7 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 9990 !important;
            pointer-events: none !important;
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
        
        /* Transparent backdrop for seat selection */
        .seat-selection-modal + .modal-backdrop,
        .modal-backdrop.seat-selection-backdrop {
            background-color: transparent !important;
            opacity: 0 !important;
        }
        
        /* Prevent background scrolling when modal is open */
        body.modal-open {
            overflow: hidden !important;
            position: fixed !important;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Ensure content is visible inside modals */
        .modal-dialog,
        .modal-content {
            z-index: 10000 !important;
            position: relative !important;
        }
    </style>
</head>

    <script>
        // Initialize all modals on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Hide all modals and remove any existing backdrops
            var modals = document.querySelectorAll('.modal');
            modals.forEach(function(modal) {
                modal.style.display = 'none';
                modal.classList.remove('show');
                
                // Specific handling for the seating options modal to ensure it gets proper backdrop
                if (modal.id === 'seatingOptionsModal') {
                    modal.classList.remove('seat-map-modal');
                    
                    // Add observer to initialize radio options when this modal becomes visible
                    var observer = new MutationObserver(function(mutations) {
                        mutations.forEach(function(mutation) {
                            if (mutation.attributeName === 'style' && 
                                modal.style.display !== 'none') {
                                // Initialize radio options when modal is shown
                                if (typeof initializeRadioOptions === 'function') {
                                    setTimeout(function() {
                                        initializeRadioOptions(modal);
                                    }, 100);
                                }
                            }
                        });
                    });
                    
                    observer.observe(modal, { attributes: true });
                }
                
                // Set attributes to prevent auto-closing
                modal.setAttribute('data-backdrop', 'static');
                modal.setAttribute('data-keyboard', 'false');
                modal.setAttribute('data-bs-backdrop', 'static');
                modal.setAttribute('data-bs-keyboard', 'false');
            });
            
            // Remove any existing backdrops
            var backdrops = document.querySelectorAll('.modal-backdrop');
            backdrops.forEach(function(backdrop) {
                backdrop.remove();
            });
            
            // Clean up body classes
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        });
    </script>
</body>
