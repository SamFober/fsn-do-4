server {
    listen 80;
    server_name localhost;
    
    # Root location - serve the Blazor app
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Blazor WebAssembly specifieke headers
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Required for Blazor WebAssembly
    location /_framework/ {
        root /usr/share/nginx/html;
    }
    
    # Static content with proper MIME types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        
        # Explicitly set MIME types for commonly used static files
        types {
            text/css css;
            application/javascript js;
            image/png png;
            image/jpeg jpg jpeg;
            image/gif gif;
            image/x-icon ico;
            application/wasm wasm;
        }
    }
    
    # proxy naar WebApi
    location /api/ {
        proxy_pass http://webapi:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Lange timeouts voor debug
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;
}